name: CI Lab

on:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          pwd
          ls -la
          bash --version | head -n 1

      - name: Run shell checks
        run: bash scripts/run-checks.sh
